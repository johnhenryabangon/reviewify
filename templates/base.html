<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Reviewify{% endblock %}</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script>
    (function () {
      const t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter','ui-sans-serif','system-ui'],
            display: ['Fraunces','ui-serif','Georgia','serif']
          },
          colors: {
            ink: { 50:'#f7f7f6', 100:'#eeeeec', 200:'#d9d9d4', 500:'#6b6b66', 700:'#2f2f2c', 900:'#141413' },
            accent: { DEFAULT:'#2563eb', soft:'#dbeafe' }
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-full bg-ink-50 text-ink-900 dark:bg-ink-900 dark:text-ink-50 font-sans antialiased selection:bg-accent/20">
  <header class="sticky top-0 z-20 border-b border-ink-100 dark:border-white/5 bg-ink-50/80 dark:bg-ink-900/80 backdrop-blur-xl">
    <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="{{ url_for('index') }}" class="flex items-center gap-2.5 group">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="" class="w-7 h-7 rounded-md object-cover ring-1 ring-black/5" />
        <span class="font-display text-lg tracking-tight">Reviewify</span>
      </a>
      <button id="themeToggle" class="text-xs px-3 py-1.5 rounded-full border border-ink-200 dark:border-white/10 text-ink-700 dark:text-ink-100 hover:bg-white dark:hover:bg-white/5 transition">
        <span class="dark:hidden">⏾</span><span class="hidden dark:inline">☀︎</span>
      </button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-14">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% if msgs %}
        <div class="space-y-2 mb-8">
          {% for cat, m in msgs %}
            <div class="px-4 py-3 rounded-xl text-sm border {% if cat == 'error' %}border-red-200 bg-red-50 text-red-800 dark:border-red-900/40 dark:bg-red-950/30 dark:text-red-200{% else %}border-emerald-200 bg-emerald-50 text-emerald-800 dark:border-emerald-900/40 dark:bg-emerald-950/30 dark:text-emerald-200{% endif %}">{{ m }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  <footer class="max-w-5xl mx-auto px-6 pb-10 text-xs text-ink-500 flex justify-between print:hidden">
    <span>Reviewify</span>
    <span>PDF · PPT · PPTX</span>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
