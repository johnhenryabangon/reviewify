<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Reviewify{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script>
    // Theme bootstrap
    (function () {
      const t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'], serif: ['"Instrument Serif"','serif'] } } } };
  </script>
</head>
<body class="min-h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 font-sans antialiased">
  <header class="border-b border-slate-200/60 dark:border-slate-800/60 backdrop-blur sticky top-0 z-10 bg-white/70 dark:bg-slate-950/70">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="{{ url_for('index') }}" class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-violet-600 grid place-items-center text-white font-bold">R</div>
        <span class="font-serif text-2xl">Reviewify</span>
      </a>
      <button id="themeToggle" class="text-sm px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
        <span class="dark:hidden">Dark</span><span class="hidden dark:inline">Light</span>
      </button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% if msgs %}
        <div class="space-y-2 mb-6">
          {% for cat, m in msgs %}
            <div class="px-4 py-3 rounded-lg text-sm {% if cat == 'error' %}bg-red-50 text-red-800 dark:bg-red-950/40 dark:text-red-200{% else %}bg-emerald-50 text-emerald-800 dark:bg-emerald-950/40 dark:text-emerald-200{% endif %}">{{ m }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
